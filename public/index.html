<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vanthex IA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a0033, #3d0066);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #b366ff;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      overflow-y: auto;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 12px;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .user {
      background: #b366ff;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .bot {
      background: rgba(255,255,255,0.1);
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    /* Barra de pergunta premium */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 15px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .icon {
      font-size: 1.2rem;
      margin: 0 8px;
      cursor: pointer;
      color: #b366ff;
      transition: color 0.3s;
    }

    .icon:hover {
      color: #9933ff;
    }

    .send-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #b366ff;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .send-btn:hover {
      background: #9933ff;
    }
  </style>
</head>
<body>
  <header>
    <h1>💡 VANTHEX IA — Consultora Digital</h1>
  </header>

  <main>
    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <div class="search-bar">
        <span class="icon">➕</span>
        <input id="question" type="text" placeholder="Pergunte alguma coisa...">
        <span class="icon">🎤</span>
        <span class="icon">⋮</span>
      </div>
      <button class="send-btn" onclick="sendToIA()">Enviar</button>
    </div>
  </main>

  <script>
    async function sendToIA() {
      const question = document.getElementById("question").value;
      const chatBox = document.getElementById("chatBox");

      if (!question.trim()) return;

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.textContent = question;
      chatBox.appendChild(userMsg);

      document.getElementById("question").value = "";

      const botMsg = document.createElement("div");
      botMsg.className = "message bot";
      botMsg.textContent = "Processando...";
      chatBox.appendChild(botMsg);

      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch("https://SEUWORKER.workers.dev", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, plan: "free" })
        });

        const data = await res.json();
        botMsg.textContent = data.error ? "Erro: " + data.error : data.answer;
      } catch (err) {
        botMsg.textContent = "Erro ao conectar.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
