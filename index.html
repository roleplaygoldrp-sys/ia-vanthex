<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vanthex IA</title>
</head>
<body>
  <h1>💡 VANTHEX IA — Consultora Digital</h1>
  <textarea id="question" placeholder="Digite sua pergunta..."></textarea>
  <button onclick="sendToIA()">Enviar</button>
  <div id="response"></div>

  <script>
    async function sendToIA() {
      const question = document.getElementById("question").value;
      const responseBox = document.getElementById("response");

      responseBox.innerHTML = "Processando...";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, plan: "free" })
        });

        const data = await res.json();
        if (data.error) {
          responseBox.innerHTML = "Erro: " + data.error;
        } else {
          responseBox.innerHTML = "Resposta: " + data.answer;
        }
      } catch (err) {
        responseBox.innerHTML = "Erro ao conectar.";
      }
    }
  </script>
</body>
</html>
